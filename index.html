<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🍃 丝滑炒股模拟器 · 10秒为一天</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #0b0f18 0%, #1a1f2b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 16px;
            margin: 0;
        }

        .simulator-card {
            max-width: 880px;
            width: 100%;
            background: rgba(22, 28, 40, 0.8);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(72, 92, 124, 0.3);
            border-radius: 42px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(120, 180, 255, 0.1) inset;
            padding: 24px 26px;
            transition: all 0.2s ease;
            color: #ebf0f7;
        }

        /* 顶部仪表 */
        .stats-dashboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px 20px;
            background: rgba(10, 15, 25, 0.6);
            border-radius: 60px;
            padding: 16px 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(74, 144, 226, 0.3);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.5);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            min-width: 100px;
        }

        .stat-label {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #90a4c9;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.2;
            display: flex;
            align-items: baseline;
            gap: 6px;
            text-shadow: 0 2px 5px rgba(0, 30, 80, 0.6);
        }

        .stat-value small {
            font-size: 16px;
            font-weight: 400;
            color: #b3c6e7;
        }

        .price-now {
            color: #4cd964;
        }

        .day-badge {
            background: #2b3b58;
            border-radius: 40px;
            padding: 8px 22px;
            text-align: center;
            border: 1px solid #3e5577;
        }

        .day-badge .day-number {
            font-size: 26px;
            font-weight: 700;
            color: #ffdb8a;
        }

        .progress-container {
            background: #1d2638;
            height: 8px;
            border-radius: 20px;
            margin: 12px 0 6px 0;
            width: 180px;
            overflow: hidden;
            border: 1px solid #32415e;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6eb1ff, #3d7eff);
            border-radius: 20px;
            box-shadow: 0 0 12px #3d7eff;
            transition: width 0.15s linear;
        }

        /* 图表区域 */
        .chart-container {
            background: #101520;
            border-radius: 32px;
            padding: 20px 10px 10px 10px;
            margin-bottom: 30px;
            border: 1px solid #2b3850;
            box-shadow: inset 0 0 20px #00000055, 0 10px 20px #00000060;
        }

        canvas#stockCanvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 18px;
            background: #0c111a;
            cursor: crosshair;
            box-shadow: 0 0 0 1px #3f5577 inset;
        }

        /* 交易面板 */
        .trade-panel {
            background: rgba(16, 22, 34, 0.7);
            border-radius: 38px;
            padding: 22px 26px;
            border: 1px solid #38506e;
            backdrop-filter: blur(8px);
            margin-top: 12px;
        }

        .trade-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 18px;
            justify-content: space-between;
        }

        .action-buttons {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            background: #1f2a3c;
            border-radius: 48px;
            border: 1px solid #415e86;
            overflow: hidden;
        }

        .quantity-control button {
            background: #2e3f5a;
            border: none;
            color: white;
            font-size: 26px;
            font-weight: 600;
            width: 48px;
            height: 54px;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            box-shadow: inset 0 -2px 0 #1b2638;
        }

        .quantity-control button:hover {
            background: #3f5680;
        }

        .quantity-control input {
            width: 80px;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            background: #0f1622;
            border: none;
            color: #eef4ff;
            padding: 10px 0;
            outline: none;
            font-feature-settings: "tnum";
        }

        .buy-sell {
            display: flex;
            gap: 15px;
        }

        .btn {
            border: none;
            border-radius: 48px;
            font-size: 24px;
            font-weight: 600;
            padding: 12px 42px;
            cursor: pointer;
            transition: 0.12s ease;
            letter-spacing: 1px;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.3), 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.4);
        }

        .btn-buy {
            background: #1f8b4c;
            color: white;
            text-shadow: 0 1px 3px #0b491f;
        }

        .btn-sell {
            background: #b13e3e;
            color: white;
            text-shadow: 0 1px 3px #5e1e1e;
        }

        .btn-secondary {
            background: #2e405d;
            color: #d8e4ff;
            font-size: 18px;
            padding: 10px 28px;
            box-shadow: 0 5px 0 #121b26;
        }

        .message-area {
            margin-top: 18px;
            font-size: 18px;
            padding: 14px 20px;
            background: #0e1a24;
            border-radius: 40px;
            border-left: 6px solid #4f6e9e;
            color: #c9dbfb;
            font-weight: 400;
            min-height: 64px;
            word-break: break-word;
        }

        .footer-controls {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* 辅助 */
        .highlight {
            color: #ffd966;
        }

        .glow-text {
            text-shadow: 0 0 8px #64b5f6;
        }

        @media (max-width: 620px) {
            .simulator-card { padding: 18px; }
            .stats-dashboard { flex-direction: column; align-items: stretch; }
            .btn { padding: 12px 24px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="simulator-card">
        <!-- 顶部面板 -->
        <div class="stats-dashboard">
            <div class="stat-item">
                <span class="stat-label">💰 现金</span>
                <span class="stat-value" id="cashDisplay">$10,000.00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">📈 持仓</span>
                <span class="stat-value" id="sharesDisplay">0 <small>股</small></span>
            </div>
            <div class="stat-item">
                <span class="stat-label">💹 当前价</span>
                <span class="stat-value price-now" id="priceDisplay">$100.00</span>
            </div>
            <div class="day-badge">
                <span style="font-size: 14px; color: #b7cef0;">⏳ 第</span>
                <span class="day-number" id="dayDisplay">1</span>
                <span style="font-size: 14px; color: #b7cef0;"> 天</span>
                <div class="progress-container">
                    <div class="progress-fill" id="timeProgress" style="width: 0%;"></div>
                </div>
                <span id="secondDisplay" style="font-size: 16px;">0/10 秒</span>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="chart-container">
            <canvas id="stockCanvas" width="800" height="280"></canvas>
        </div>

        <!-- 交易面板 -->
        <div class="trade-panel">
            <div class="trade-row">
                <div class="quantity-control">
                    <button id="decQty">−</button>
                    <input type="number" id="tradeQty" value="10" min="1" step="1">
                    <button id="incQty">+</button>
                </div>
                <div class="buy-sell">
                    <button class="btn btn-buy" id="buyBtn">买入</button>
                    <button class="btn btn-sell" id="sellBtn">卖出</button>
                </div>
            </div>

            <!-- 消息区域 -->
            <div class="message-area" id="messageBox">
                ⚡ 欢迎，每10秒为一天。点击买入/卖出。
            </div>

            <!-- 辅助控制 -->
            <div class="footer-controls">
                <button class="btn-secondary" id="pauseBtn">⏸️ 暂停</button>
                <button class="btn-secondary" id="resetBtn">⟲ 重置</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 配置 ----------
            const INIT_CASH = 10000.00;
            const INIT_PRICE = 100.00;
            const MAX_HISTORY = 200;            // 图表显示最多点数
            const TICK_SECONDS = 10;              // 10秒一天
            const VOLATILITY = 0.018;              // 每秒波动幅度 ±1.8% (日波动~ ±5.7%左右)

            // ---------- 全局状态 ----------
            let cash = INIT_CASH;
            let shares = 0;
            let price = INIT_PRICE;
            let historyPrices = [];                // 存储历史价格 (最新在最后)
            let day = 1;
            let second = 0;                         // 0 ~ 9

            // 定时器
            let timer = null;
            let isPaused = false;                   // 辅助界面按钮文字

            // DOM 元素
            const cashDisplay = document.getElementById('cashDisplay');
            const sharesDisplay = document.getElementById('sharesDisplay');
            const priceDisplay = document.getElementById('priceDisplay');
            const dayDisplay = document.getElementById('dayDisplay');
            const secondDisplay = document.getElementById('secondDisplay');
            const timeProgress = document.getElementById('timeProgress');
            const messageBox = document.getElementById('messageBox');

            const canvas = document.getElementById('stockCanvas');
            let ctx = canvas.getContext('2d');

            const tradeQty = document.getElementById('tradeQty');
            const decQty = document.getElementById('decQty');
            const incQty = document.getElementById('incQty');
            const buyBtn = document.getElementById('buyBtn');
            const sellBtn = document.getElementById('sellBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const resetBtn = document.getElementById('resetBtn');

            // ---------- 辅助函数：保留两位小数 (避免浮点噪声) ----------
            const roundMoney = (val) => Math.round(val * 100) / 100;

            // 显示消息（几秒后消失部分，但保留最后一条）
            let msgTimeout;
            const setMessage = (text, isSuccess = true) => {
                if (msgTimeout) clearTimeout(msgTimeout);
                messageBox.textContent = text;
                messageBox.style.borderLeftColor = isSuccess ? '#4f9e7a' : '#b13e5c';
                // 普通消息保留，但不要永久覆盖，5秒后恢复提示
                msgTimeout = setTimeout(() => {
                    messageBox.textContent = '⚡ 每10秒一天，继续交易吧';
                    messageBox.style.borderLeftColor = '#4f6e9e';
                }, 5000);
            };

            // ---------- 生成初始历史价格 (从INIT_PRICE出发随机游走) ----------
            const generateInitialHistory = () => {
                const hist = [];
                let cur = INIT_PRICE;
                for (let i = 0; i < MAX_HISTORY; i++) {
                    hist.push(cur);
                    // 随机下一步 (保证最后价格不等于初始，但是波动)
                    if (i < MAX_HISTORY - 1) {
                        let change = (Math.random() - 0.5) * 2 * VOLATILITY * cur;
                        let next = cur + change;
                        next = Math.max(0.02, roundMoney(next));
                        cur = next;
                    }
                }
                price = cur;   // 最后一个价格作为当前价
                return hist;
            };

            historyPrices = generateInitialHistory();

            // ---------- 更新价格 (每秒调用) ----------
            const tickPrice = () => {
                // 随机游走一步
                let change = (Math.random() - 0.5) * 2 * VOLATILITY * price;
                let newPrice = price + change;
                newPrice = Math.max(0.02, roundMoney(newPrice));
                price = newPrice;

                // 加入历史，保持最大长度
                historyPrices.push(price);
                if (historyPrices.length > MAX_HISTORY) {
                    historyPrices.shift();
                }
            };

            // ---------- 更新时间相关 (day, second)，并且触发价格变动 ----------
            const advanceTime = () => {
                second++;
                if (second >= TICK_SECONDS) {
                    second = 0;
                    day++;
                }

                // 每秒变动价格
                tickPrice();
            };

            // ---------- 刷新全部UI (文字、进度、画图) ----------
            const updateUI = () => {
                // 更新文本
                cashDisplay.textContent = `$${cash.toFixed(2)}`;
                sharesDisplay.textContent = `${shares} `;
                priceDisplay.textContent = `$${price.toFixed(2)}`;
                dayDisplay.textContent = day;
                secondDisplay.textContent = `${second}/${TICK_SECONDS} 秒`;

                // 进度条 (second / 10)
                const progressPercent = (second / TICK_SECONDS) * 100;
                timeProgress.style.width = `${progressPercent}%`;

                // 重绘图表
                drawChart();
            };

            // ---------- 绘图 (丝滑画布) ----------
            const drawChart = () => {
                // 适配视网膜屏 / 动态尺寸
                const container = canvas.parentNode;
                const containerWidth = container.clientWidth;
                const containerHeight = 280; // 固定高度

                // 设置canvas实际像素（保证锐利）
                const dpr = window.devicePixelRatio || 1;
                canvas.width = containerWidth * dpr;
                canvas.height = containerHeight * dpr;
                canvas.style.width = containerWidth + 'px';
                canvas.style.height = containerHeight + 'px';
                ctx.scale(dpr, dpr);

                // 暗色背景
                ctx.clearRect(0, 0, containerWidth, containerHeight);

                if (!historyPrices || historyPrices.length < 2) return;

                const len = historyPrices.length;
                const padding = { top: 20, bottom: 30, left: 38, right: 28 };
                const graphWidth = containerWidth - padding.left - padding.right;
                const graphHeight = containerHeight - padding.top - padding.bottom;

                // 计算价格范围 (加上一点边距)
                let minPrice = Math.min(...historyPrices);
                let maxPrice = Math.max(...historyPrices);
                const range = maxPrice - minPrice;
                // 避免范围为零
                if (range < 0.001) {
                    minPrice = price * 0.95;
                    maxPrice = price * 1.05;
                } else {
                    // 扩展10%留白
                    const extra = range * 0.1;
                    minPrice = Math.max(0, minPrice - extra);
                    maxPrice = maxPrice + extra;
                }

                const yScale = graphHeight / (maxPrice - minPrice || 1);

                // 绘制网格线 (暗纹)
                ctx.beginPath();
                ctx.strokeStyle = "#25344f";
                ctx.lineWidth = 1;
                for (let i = 0; i <= 4; i++) {
                    const y = padding.top + (i / 4) * graphHeight;
                    ctx.beginPath();
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(containerWidth - padding.right, y);
                    ctx.strokeStyle = '#1f2b3e';
                    ctx.stroke();
                }

                // 绘制折线
                ctx.beginPath();
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#5db0e2';
                ctx.shadowColor = '#3f96e0';
                ctx.shadowBlur = 12;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';

                for (let i = 0; i < len; i++) {
                    const x = padding.left + (i / (len - 1)) * graphWidth;
                    const y = padding.top + graphHeight - ( (historyPrices[i] - minPrice) * yScale );
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;

                // 填充渐变下方
                ctx.beginPath();
                for (let i = 0; i < len; i++) {
                    const x = padding.left + (i / (len - 1)) * graphWidth;
                    const y = padding.top + graphHeight - ( (historyPrices[i] - minPrice) * yScale );
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.lineTo(padding.left + graphWidth, containerHeight - padding.bottom);
                ctx.lineTo(padding.left, containerHeight - padding.bottom);
                ctx.closePath();
                const gradient = ctx.createLinearGradient(0, padding.top, 0, containerHeight - padding.bottom);
                gradient.addColorStop(0, 'rgba(45, 140, 230, 0.25)');
                gradient.addColorStop(1, 'rgba(20, 50, 100, 0.02)');
                ctx.fillStyle = gradient;
                ctx.fill();

                // 画当前价格标记圆点
                const lastX = padding.left + graphWidth;
                const lastY = padding.top + graphHeight - ( (price - minPrice) * yScale );
                ctx.beginPath();
                ctx.arc(lastX, lastY, 8, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffc164';
                ctx.shadowBlur = 18;
                ctx.shadowColor = '#f0a500';
                ctx.fill();
                ctx.shadowBlur = 0;

                // 标价格标签
                ctx.font = 'bold 14px "Segoe UI", monospace';
                ctx.fillStyle = '#e3efff';
                ctx.fillText(`$${price.toFixed(2)}`, lastX - 50, lastY - 16);
            };

            // ---------- 交易逻辑 ----------
            const handleBuy = () => {
                let qty = parseInt(tradeQty.value, 10);
                if (isNaN(qty) || qty < 1) qty = 1;
                const cost = roundMoney(price * qty);
                if (cash >= cost) {
                    cash = roundMoney(cash - cost);
                    shares += qty;
                    setMessage(`✅ 买入 ${qty} 股，成交价 $${price.toFixed(2)}`, true);
                } else {
                    setMessage(`❌ 资金不足！需要 $${cost.toFixed(2)}，可用 $${cash.toFixed(2)}`, false);
                }
                updateUI();
            };

            const handleSell = () => {
                let qty = parseInt(tradeQty.value, 10);
                if (isNaN(qty) || qty < 1) qty = 1;
                if (shares >= qty) {
                    const income = roundMoney(price * qty);
                    cash = roundMoney(cash + income);
                    shares -= qty;
                    setMessage(`✅ 卖出 ${qty} 股，成交价 $${price.toFixed(2)}`, true);
                } else {
                    setMessage(`❌ 持仓不足！只有 ${shares} 股`, false);
                }
                updateUI();
            };

            // ---------- 数量加减 ----------
            const adjustQty = (delta) => {
                let val = parseInt(tradeQty.value, 10);
                if (isNaN(val)) val = 1;
                val = Math.max(1, val + delta);
                tradeQty.value = val;
            };

            // ---------- 重置 ----------
            const resetSim = () => {
                // 暂停当前计时
                if (timer) {
                    clearInterval(timer);
                    timer = null;
                }

                // 重置状态
                cash = INIT_CASH;
                shares = 0;
                day = 1;
                second = 0;
                historyPrices = generateInitialHistory(); // 重新生成历史
                price = historyPrices[historyPrices.length - 1];
                tradeQty.value = 10;
                setMessage('🔄 已重置，重新开始', true);
                updateUI();

                // 重启定时器 (自动开始)
                if (!timer) {
                    timer = setInterval(() => {
                        advanceTime();
                        updateUI();
                    }, 1000); // 每秒更新
                    pauseBtn.textContent = '⏸️ 暂停';
                    isPaused = false;
                }
            };

            // ---------- 暂停/继续 ----------
            const togglePause = () => {
                if (timer) {
                    // 正在运行 -> 暂停
                    clearInterval(timer);
                    timer = null;
                    pauseBtn.textContent = '▶️ 开始';
                    setMessage('⏸️ 暂停中，价格不变', false);
                } else {
                    // 启动
                    timer = setInterval(() => {
                        advanceTime();
                        updateUI();
                    }, 1000);
                    pauseBtn.textContent = '⏸️ 暂停';
                    setMessage('▶️ 继续模拟', true);
                }
                // 更新UI确保显示最新状态
                updateUI();
            };

            // ---------- 绑定事件 & 初始化 ----------
            const init = () => {
                // 初始显示
                updateUI();

                // 启动定时器
                timer = setInterval(() => {
                    advanceTime();
                    updateUI();
                }, 1000);
                pauseBtn.textContent = '⏸️ 暂停';

                // 加减按钮
                decQty.addEventListener('click', () => adjustQty(-1));
                incQty.addEventListener('click', () => adjustQty(1));

                // 交易按钮
                buyBtn.addEventListener('click', handleBuy);
                sellBtn.addEventListener('click', handleSell);

                // 控制按钮
                pauseBtn.addEventListener('click', togglePause);
                resetBtn.addEventListener('click', resetSim);

                // 输入框限制
                tradeQty.addEventListener('change', function() {
                    let v = parseInt(this.value, 10);
                    if (isNaN(v) || v < 1) this.value = 1;
                });

                // 窗口大小变化时重绘（丝滑适应）
                window.addEventListener('resize', () => {
                    drawChart();
                });

                // 额外，交易后更新（已经包含）
            };

            // 启动一切
            init();
        })();
    </script>
</body>
</html>
